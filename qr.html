<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador QR  - PideClick</title>
    <!-- Librerías necesarias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            /* Paleta de colores PideClick */
            --primary: #F97316;
            --primary-dark: #EA580C;
            --background: #09090B;
            --surface: #18181B;
            --success: #10B981;
            --gray-soft: #27272A;
            --text-main: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #a1a1aa;
            margin-top: 0;
        }

        /* Contenedor de Controles */
        .controls {
            background-color: var(--surface);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 0.9rem;
            color: #d4d4d8;
            margin-bottom: -5px;
            display: block;
        }

        input {
            background-color: var(--gray-soft);
            border: 1px solid #3f3f46;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        button.secondary {
            background-color: var(--gray-soft);
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        
        button.secondary:hover {
            background-color: var(--surface);
        }

        /* ÁREA DE IMPRESIÓN / TARJETA */
        /* Dimensiones para mitad de A4 horizontal: 210mm x 148.5mm */
        .print-area {
            width: 210mm;
            height: 148.5mm; 
            background-color: var(--surface);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.1);
        }

        /* Efecto decorativo de fondo */
        .print-area::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.05) 0%, transparent 60%);
            z-index: 0;
        }

        /* Lado Izquierdo: Info y Logo */
        .card-info {
            flex: 1;
            z-index: 1;
            padding-left: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-container {
            width: 120px;
            margin-bottom: 20px;
        }
        
        .logo-container img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .restaurant-name {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .scan-text {
            font-size: 1.2rem;
            color: var(--primary);
            margin-top: 10px;
            font-weight: 500;
        }

        /* Lado Derecho: QR */
        .qr-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            background-color: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-right: 40px;
        }

        #qrcode {
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Responsividad para pantallas pequeñas */
        @media screen and (max-width: 800px) {
            .print-area {
                width: 100%;
                height: auto;
                min-height: 400px;
                flex-direction: column;
                padding: 30px;
            }
            .card-info {
                padding-left: 0;
                align-items: center;
                text-align: center;
                margin-bottom: 20px;
            }
            .restaurant-name {
                font-size: 2rem;
            }
            .qr-container {
                margin-right: 0;
            }
        }

        /* Estilos para impresión real (Ctrl+P) */
        @media print {
            body {
                background-color: white;
            }
            .controls, h1, p.subtitle, button {
                display: none !important;
            }
            .print-area {
                width: 210mm;
                height: 148.5mm;
                margin: 0;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>

    <h1>Generador de Menú QR</h1>
    <p class="subtitle">Crea tu tarjeta lista para imprimir</p>

    <!-- Sección de Controles -->
    <div class="controls">
        <div>
            <label for="restaurantName">Nombre del Restaurante</label>
            <input type="text" id="restaurantName" placeholder="Ej: Pizzería Don Luigi">
        </div>
        <div>
            <label for="urlLink">URL del Menú</label>
            <input type="text" id="urlLink" placeholder="https://tumenu.com">
        </div>
        <button onclick="generarTarjeta()">Generar Tarjeta</button>
        <button class="secondary" onclick="descargarImagen()">Descargar Imagen (PNG)</button>
    </div>

    <!-- Tarjeta Generada (Área de Impresión) -->
    <div class="print-area" id="captureArea">
        <!-- Lado Izquierdo: Logo y Nombre -->
        <div class="card-info">
            <div class="logo-container">
                <!-- CORRECCIÓN: Añadimos crossorigin="anonymous" para permitir descarga canvas -->
                <img id="logo-pideclick" 
                     src="logo2.png" 
                     alt="PideClick Logo" 
                     crossorigin="anonymous">
            </div>
            <h2 class="restaurant-name" id="displayName">TU RESTAURANTE</h2>
            <p class="scan-text">Escanea para hacer pedido</p>
        </div>

        <!-- Lado Derecho: Código QR -->
        <div class="qr-container">
            <div id="qrcode"></div>
        </div>
    </div>

    <script>
        let qrcodeInstance = null;

        function generarTarjeta() {
            const name = document.getElementById('restaurantName').value || "NOMBRE DEL RESTAURANTE";
            const url = document.getElementById('urlLink').value;

            if (!url) {
                alert("Por favor, ingresa una URL válida.");
                return;
            }

            document.getElementById('displayName').innerText = name.toUpperCase();

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";

            qrcodeInstance = new QRCode(qrContainer, {
                text: url,
                width: 256,
                height: 256,
                colorDark: "#18181B",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        async function descargarImagen() {
            const area = document.getElementById('captureArea');
            
            if (!document.getElementById('qrcode').innerHTML) {
                alert("Primero genera la tarjeta antes de descargar.");
                return;
            }

            try {
                // Forzamos la carga limpia del logo antes de capturar
                const logoImg = document.getElementById('logo-pideclick');
                // Si la imagen no se ha cargado aún o necesitamos refrescar el modo CORS
                if (!logoImg.complete) {
                     await new Promise((resolve, reject) => {
                        logoImg.onload = resolve;
                        logoImg.onerror = reject;
                    });
                }

                // Capturamos el div
                const canvas = await html2canvas(area, {
                    scale: 2, // Alta resolución
                    useCORS: true, // Vital para imágenes externas
                    allowTaint: false, // Mantener limpio el canvas
                    backgroundColor: '#18181B'
                });

                // Descarga
                const link = document.createElement('a');
                link.download = 'tarjeta-qr-restaurante.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
            } catch (error) {
                console.error("Error al generar imagen:", error);
                alert("Hubo un error al descargar. Si el logo no aparece, intenta recargar la página o verificar tu conexión.");
            }
        }
    </script>

</body>
</html>
